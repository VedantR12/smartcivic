<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Resolution — SmartCivic</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="sc-center-page">
  <div style="width:100%; max-width:460px; text-align:center; animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;">

    <div style="margin-bottom:32px;">
      <span style="font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--white-pure);">
        Smart<span style="color:var(--amber)">Civic</span>
      </span>
    </div>

    <div class="sc-card">
      <div id="statusIcon" style="font-size:3rem; margin-bottom:16px;">⏳</div>
      <h1 id="statusTitle" style="font-size:1.4rem; margin-bottom:12px;">Processing...</h1>
      <p id="statusMessage" style="font-size:14px; color:var(--slate); line-height:1.6;">Please wait while we update your complaint.</p>
      <div style="margin-top:24px;">
        <a href="/" style="font-size:13px; color:var(--amber);">← Back to SmartCivic</a>
      </div>
    </div>

  </div>
</div>
<script type="module" src="/js/confirm.js"></script>
</body>
</html>
