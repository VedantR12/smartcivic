<link rel="stylesheet" href="/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">

<div class="sc-center-page">
  <div style="width:100%; max-width:420px; animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;">

    <!-- Brand -->
    <div style="text-align:center; margin-bottom:32px;">
      <a href="/" style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; margin-bottom:24px;">
        <span style="width:10px;height:10px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber);display:inline-block;"></span>
        <span style="font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--white-pure);">Smart<span style="color:var(--amber)">Civic</span></span>
      </a>
      <h2 style="font-size:1.6rem; margin-bottom:8px;">Create your account</h2>
      <p style="font-size:14px; color:var(--slate);">Join thousands of citizens making a difference</p>
    </div>

    <div class="sc-card">
      <div class="sc-field">
        <label>Full Name</label>
        <input id="name" placeholder="Your full name">
      </div>
      <div class="sc-field">
        <label>Phone Number</label>
        <input id="phone" placeholder="+91 XXXXX XXXXX">
      </div>
      <div class="sc-field">
        <label>Email address</label>
        <input id="email" type="email" placeholder="you@example.com">
      </div>
      <div class="sc-field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Create a strong password">
      </div>

      <div style="margin-top:20px;">
        <button id="registerBtn" class="btn-primary btn-full btn-lg">Create Account</button>
      </div>
      <div style="margin-top:18px; text-align:center; font-size:13px; color:var(--slate);">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>

      <!-- Divider -->
      <div style="display:flex; align-items:center; gap:12px; margin:20px 0;">
        <div style="flex:1; height:1px; background:var(--border);"></div>
        <span style="font-size:12px; color:var(--slate);">or continue with</span>
        <div style="flex:1; height:1px; background:var(--border);"></div>
      </div>

      <!-- Google Button -->
      <button id="googleBtn" style="
        width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
        background:var(--navy-card); border:1px solid var(--border); border-radius:var(--radius-lg);
        padding:11px 20px; color:var(--white); font-size:14px; font-weight:500;
        cursor:pointer; transition:all var(--transition);
      ">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>

    <div style="text-align:center; margin-top:16px;">
      <a href="/" style="font-size:13px; color:var(--slate);">← Back to home</a>
    </div>

  </div>
</div>



<script type="module" src="/js/auth.js"></script>
